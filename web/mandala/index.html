<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>三十七堆曼茶罗观想播放</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <section class="viewer" aria-label="三十七堆曼茶罗二维布局">
        <div class="aura" aria-hidden="true"></div>
        <div class="stage" id="stage">
          <img class="layout-reference" src="./assets/layout/background-page1-layout.png" alt="" aria-hidden="true">
          <svg class="mandala-backdrop" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <radialGradient id="oceanGlow" cx="50%" cy="48%" r="56%">
                <stop offset="0%" stop-color="#55d6df"></stop>
                <stop offset="45%" stop-color="#19a7d7"></stop>
                <stop offset="72%" stop-color="#1376c9"></stop>
                <stop offset="100%" stop-color="#171e96"></stop>
              </radialGradient>
              <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff1b2" stop-opacity="0.72"></stop>
                <stop offset="62%" stop-color="#f0bf4f" stop-opacity="0.18"></stop>
                <stop offset="100%" stop-color="#f0bf4f" stop-opacity="0"></stop>
              </radialGradient>
              <linearGradient id="mountainTop" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f4282c"></stop>
                <stop offset="26%" stop-color="#f4282c"></stop>
                <stop offset="27%" stop-color="#1755df"></stop>
                <stop offset="50%" stop-color="#1755df"></stop>
                <stop offset="51%" stop-color="#fff8df"></stop>
                <stop offset="74%" stop-color="#fff8df"></stop>
                <stop offset="75%" stop-color="#f3d91f"></stop>
                <stop offset="100%" stop-color="#f3d91f"></stop>
              </linearGradient>
              <pattern id="rimCloudBlue" width="14" height="14" patternUnits="userSpaceOnUse">
                <rect width="14" height="14" fill="#1b70d8"></rect>
                <path d="M-2 7 C1.6 3.5 5.8 3.6 7.6 6 C9.4 8.5 6.4 11.1 3.7 9.4" fill="none" stroke="#9be9ff" stroke-width="1.15" stroke-linecap="round"></path>
                <path d="M7.1 2.4 C10.6 0.4 14.1 2.8 12.9 5.7 C12.1 7.7 9.7 8.2 8.1 6.8" fill="none" stroke="#073789" stroke-width="0.9" stroke-linecap="round"></path>
                <path d="M0.8 12.2 C4.6 10.2 8.5 11.2 10.5 13.6" fill="none" stroke="#72caff" stroke-width="0.8" stroke-linecap="round"></path>
              </pattern>
              <pattern id="rimCloudGold" width="14" height="14" patternUnits="userSpaceOnUse">
                <rect width="14" height="14" fill="#f2b51e"></rect>
                <path d="M-2 7 C1.6 3.5 5.9 3.7 7.7 6.1 C9.3 8.5 6.4 11.1 3.6 9.4" fill="none" stroke="#fff7b8" stroke-width="1.15" stroke-linecap="round"></path>
                <path d="M7.1 2.2 C10.6 0.4 14.1 2.7 12.9 5.7 C12.1 7.8 9.7 8.3 8.1 6.8" fill="none" stroke="#a8460e" stroke-width="0.9" stroke-linecap="round"></path>
                <path d="M0.8 12.2 C4.6 10.2 8.5 11.2 10.5 13.6" fill="none" stroke="#ffd36a" stroke-width="0.8" stroke-linecap="round"></path>
              </pattern>
              <pattern id="rimCloudCyan" width="14" height="14" patternUnits="userSpaceOnUse">
                <rect width="14" height="14" fill="#27bac9"></rect>
                <path d="M-2 7 C1.6 3.5 5.8 3.6 7.7 6 C9.4 8.5 6.4 11.1 3.7 9.4" fill="none" stroke="#d7fff7" stroke-width="1.15" stroke-linecap="round"></path>
                <path d="M7.1 2.2 C10.6 0.4 14.1 2.7 12.9 5.7 C12.1 7.7 9.7 8.3 8.1 6.8" fill="none" stroke="#0e6670" stroke-width="0.9" stroke-linecap="round"></path>
                <path d="M0.8 12.2 C4.6 10.2 8.5 11.2 10.5 13.6" fill="none" stroke="#8ff3e6" stroke-width="0.8" stroke-linecap="round"></path>
              </pattern>
              <pattern id="rimCloudRose" width="14" height="14" patternUnits="userSpaceOnUse">
                <rect width="14" height="14" fill="#d8328f"></rect>
                <path d="M-2 7 C1.6 3.5 5.8 3.6 7.7 6 C9.4 8.5 6.4 11.1 3.7 9.4" fill="none" stroke="#ffd0e8" stroke-width="1.15" stroke-linecap="round"></path>
                <path d="M7.1 2.2 C10.6 0.4 14.1 2.7 12.9 5.7 C12.1 7.7 9.7 8.3 8.1 6.8" fill="none" stroke="#72104f" stroke-width="0.9" stroke-linecap="round"></path>
                <path d="M0.8 12.2 C4.6 10.2 8.5 11.2 10.5 13.6" fill="none" stroke="#ff8ec7" stroke-width="0.8" stroke-linecap="round"></path>
              </pattern>
              <pattern id="rimCloudOrange" width="14" height="14" patternUnits="userSpaceOnUse">
                <rect width="14" height="14" fill="#ef5a22"></rect>
                <path d="M-2 7 C1.6 3.5 5.8 3.6 7.7 6 C9.4 8.5 6.4 11.1 3.7 9.4" fill="none" stroke="#ffd08b" stroke-width="1.15" stroke-linecap="round"></path>
                <path d="M7.1 2.2 C10.6 0.4 14.1 2.7 12.9 5.7 C12.1 7.7 9.7 8.3 8.1 6.8" fill="none" stroke="#982411" stroke-width="0.9" stroke-linecap="round"></path>
                <path d="M0.8 12.2 C4.6 10.2 8.5 11.2 10.5 13.6" fill="none" stroke="#ff9b4d" stroke-width="0.8" stroke-linecap="round"></path>
              </pattern>
              <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#06143c" flood-opacity="0.32"></feDropShadow>
              </filter>
            </defs>
            <rect class="backdrop-paper" x="0" y="0" width="100" height="100"></rect>
            <ellipse class="backdrop-halo" cx="50" cy="50" rx="45.5" ry="45.5"></ellipse>
            <g class="backdrop-rim" filter="url(#softShadow)">
              <path class="rim-band rim-band--01" d="M37.65 6.94 A44.8 44.8 0 0 1 65.32 7.90"></path>
              <path class="rim-band rim-band--02" d="M75.05 12.86 A44.8 44.8 0 0 1 93.06 37.65"></path>
              <path class="rim-band rim-band--03" d="M94.77 48.44 A44.8 44.8 0 0 1 83.29 79.98"></path>
              <path class="rim-band rim-band--04" d="M74.40 87.57 A44.8 44.8 0 0 1 46.87 94.69"></path>
              <path class="rim-band rim-band--05" d="M35.41 92.36 A44.8 44.8 0 0 1 12.01 73.74"></path>
              <path class="rim-band rim-band--06" d="M7.39 63.84 A44.8 44.8 0 0 1 8.46 33.22"></path>
              <path class="rim-band rim-band--07" d="M13.76 23.67 A44.8 44.8 0 0 1 34.68 7.90"></path>
            </g>
            <ellipse class="backdrop-outer-water" cx="50" cy="50" rx="41.8" ry="41.8"></ellipse>
            <ellipse class="backdrop-inner-water" cx="50" cy="50" rx="35.6" ry="35.6"></ellipse>
            <ellipse class="backdrop-center-glow" cx="50" cy="50" rx="23.5" ry="23.5"></ellipse>
            <g class="backdrop-lotus-lines">
              <ellipse cx="50" cy="50" rx="39.4" ry="39.4"></ellipse>
              <ellipse cx="50" cy="50" rx="30.2" ry="30.2"></ellipse>
              <ellipse cx="50" cy="50" rx="21.1" ry="21.1"></ellipse>
            </g>
            <g class="backdrop-cardinals">
              <text x="50" y="3.8">西</text>
              <text x="50" y="98.4">东</text>
              <text x="3.4" y="50.9">南</text>
              <text x="96.6" y="50.9">北</text>
            </g>
            <g class="backdrop-axis">
              <line x1="50" y1="9.2" x2="50" y2="91.8"></line>
              <line x1="8.8" y1="50" x2="91.2" y2="50"></line>
              <line x1="20.8" y1="20.8" x2="79.2" y2="79.2"></line>
              <line x1="79.2" y1="20.8" x2="20.8" y2="79.2"></line>
            </g>
            <g class="backdrop-offering-path">
              <path d="M50 17.2 C55.8 27.6 60.8 36.2 73.2 49.2"></path>
              <path d="M82.5 49.2 C69.1 55.2 60.8 60.1 50 78.8"></path>
              <path d="M50 83.6 C44.1 68.6 37.2 58.8 16.4 49"></path>
              <path d="M10.8 49 C27.1 43.1 37.6 36.5 50 17.2"></path>
            </g>
            <g class="backdrop-mountain" filter="url(#softShadow)">
              <rect x="43.5" y="43.6" width="13" height="13" rx="0.3"></rect>
              <path d="M43.5 43.6 L50 49.8 L56.5 43.6 Z"></path>
              <path d="M56.5 43.6 L50 49.8 L56.5 56.6 Z"></path>
              <path d="M56.5 56.6 L50 49.8 L43.5 56.6 Z"></path>
              <path d="M43.5 56.6 L50 49.8 L43.5 43.6 Z"></path>
              <rect x="46.5" y="46.6" width="7" height="7" rx="0.2"></rect>
            </g>
          </svg>
          <svg class="mandala-svg" id="mandalaSvg" viewBox="0 0 100 100" preserveAspectRatio="none" role="img" aria-label="三十七堆曼茶罗矢量布局"></svg>
        </div>
      </section>

      <div class="marker" id="marker" aria-hidden="true"></div>
      <svg class="connector" id="connector" aria-hidden="true">
        <defs>
          <linearGradient id="connectorGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#fff4b8" stop-opacity="0.95"></stop>
            <stop offset="55%" stop-color="#d9b45b" stop-opacity="0.55"></stop>
            <stop offset="100%" stop-color="#d9b45b" stop-opacity="0.08"></stop>
          </linearGradient>
        </defs>
        <line id="connectorLine" x1="0" y1="0" x2="0" y2="0"></line>
        <circle id="connectorOrigin" cx="0" cy="0" r="3.5"></circle>
      </svg>
      <div class="detail" id="detail" aria-live="polite">
        <img id="detailImage" alt="">
        <div class="detail-text" id="detailText"></div>
        <div class="detail-caption" id="detailCaption"></div>
      </div>
      <div class="status-toast" id="statusToast" aria-live="polite" aria-hidden="true">
        <div class="status-toast__icon" id="statusIcon"></div>
        <div class="status-toast__copy">
          <div class="status-toast__title" id="statusTitle"></div>
          <div class="status-toast__meta" id="statusMeta"></div>
        </div>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
